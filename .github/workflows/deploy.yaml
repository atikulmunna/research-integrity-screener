name: deploy

# Deploys the app to shinyapps.io. Runs on every push to master *if* the three
# repository secrets are configured (Settings -> Secrets and variables ->
# Actions): SHINYAPPS_NAME, SHINYAPPS_TOKEN, SHINYAPPS_SECRET. Tokens come from
# https://www.shinyapps.io/admin/#/tokens . Can also be triggered manually.

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
      SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
      SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Install system dependencies
        if: ${{ env.SHINYAPPS_TOKEN != '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpoppler-cpp-dev libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libfreetype6-dev libharfbuzz-dev libfribidi-dev \
            libpng-dev libtiff5-dev libjpeg-dev

      - uses: r-lib/actions/setup-r-dependencies@v2
        if: ${{ env.SHINYAPPS_TOKEN != '' }}
        with:
          extra-packages: any::rsconnect

      - name: Deploy to shinyapps.io
        if: ${{ env.SHINYAPPS_TOKEN != '' }}
        run: |
          Rscript -e 'rsconnect::setAccountInfo(
                        name   = Sys.getenv("SHINYAPPS_NAME"),
                        token  = Sys.getenv("SHINYAPPS_TOKEN"),
                        secret = Sys.getenv("SHINYAPPS_SECRET"));
                      rsconnect::deployApp(
                        appName  = "research-integrity-screener",
                        appTitle = "Research Integrity Screener",
                        appFiles = c("R", "inst", "NAMESPACE", "DESCRIPTION", "app.R"),
                        forceUpdate = TRUE)'
