name: logs

# Fetches recent shinyapps.io logs for the deployed app, to debug startup errors.
on:
  workflow_dispatch:

jobs:
  logs:
    runs-on: ubuntu-latest
    env:
      SHINYAPPS_NAME: ${{ secrets.SHINYAPPS_NAME }}
      SHINYAPPS_TOKEN: ${{ secrets.SHINYAPPS_TOKEN }}
      SHINYAPPS_SECRET: ${{ secrets.SHINYAPPS_SECRET }}
    steps:
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: any::rsconnect
      - name: Show app logs
        run: |
          Rscript -e 'rsconnect::setAccountInfo(
                        name   = Sys.getenv("SHINYAPPS_NAME"),
                        token  = Sys.getenv("SHINYAPPS_TOKEN"),
                        secret = Sys.getenv("SHINYAPPS_SECRET"));
                      rsconnect::showLogs(
                        appName = "research-integrity-screener",
                        account = Sys.getenv("SHINYAPPS_NAME"),
                        entries = 300)'
